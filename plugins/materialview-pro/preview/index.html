<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MaterialView Pro — Preview</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #0a0a0a; color: #fff; }
    .container { max-width: 800px; margin: 0 auto; padding: 40px 20px; }
    h1 { font-size: 2.5rem; background: linear-gradient(135deg, #c9a227, #8b6914); -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin-bottom: 16px; }
    .subtitle { color: #888; font-size: 1.1rem; margin-bottom: 40px; }
    .demo { display: grid; grid-template-columns: 1fr 1fr; gap: 24px; margin-bottom: 40px; }
    .card { background: #1a1a1a; border-radius: 16px; overflow: hidden; border: 1px solid #333; }
    .card img { width: 100%; aspect-ratio: 4/3; object-fit: cover; }
    .card .label { padding: 16px; text-align: center; color: #aaa; font-size: 0.9rem; }
    .arrow { display: flex; align-items: center; justify-content: center; font-size: 2rem; color: #c9a227; }
    .materials { display: flex; gap: 12px; flex-wrap: wrap; justify-content: center; margin-bottom: 40px; }
    .material-chip { padding: 8px 16px; background: #1a1a1a; border: 1px solid #333; border-radius: 24px; font-size: 0.85rem; color: #ccc; }
    .material-chip.active { border-color: #c9a227; color: #c9a227; }
    .cta { text-align: center; }
    .cta a { display: inline-block; padding: 14px 32px; background: linear-gradient(135deg, #c9a227, #8b6914); color: #000; text-decoration: none; border-radius: 8px; font-weight: 600; }
  </style>
</head>
<body>
  <div class="container">
    <h1>MaterialView Pro</h1>
    <p class="subtitle">AI-powered material simulation for surfaces</p>

    <div class="demo">
      <div class="card">
        <div style="width:100%;aspect-ratio:4/3;background:linear-gradient(135deg,#2a2a2a,#1a1a1a);display:flex;align-items:center;justify-content:center;color:#555;font-size:0.9rem;">Original Image</div>
        <div class="label">Before</div>
      </div>
      <div class="card">
        <div style="width:100%;aspect-ratio:4/3;background:linear-gradient(135deg,#f5f5f5,#d0d0d0);display:flex;align-items:center;justify-content:center;color:#888;font-size:0.9rem;">Simulated Marble</div>
        <div class="label">After</div>
      </div>
    </div>

    <div class="materials">
      <span class="material-chip active">Marble</span>
      <span class="material-chip">Wood</span>
      <span class="material-chip">Ceramic</span>
      <span class="material-chip">Granite</span>
      <span class="material-chip">Concrete</span>
      <span class="material-chip">Metal</span>
      <span class="material-chip">Glass</span>
    </div>

    <div class="cta">
      <a href="#">Try in StoryForge Studio</a>
    </div>
  </div>
</body>
</html>
